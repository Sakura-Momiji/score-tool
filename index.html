<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スコア提出ツール</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 id="title"></h1>

        <div class="top-bar">
            <label id="label-lang"></label>
            <select id="lang">
                <option value="ja">日本語</option>
                <option value="en">English</option>
            </select>
        </div>

        <div class="card">

            <div class="form-row">
                <label id="label-stadium"></label>
                <select id="stadium"></select>
            </div>

            <div class="form-row">
                <label id="label-rank"></label>
                <input type="number" id="rank" min="1" max="16" value="1">
            </div>

            <div class="form-row">
                <label id="label-count"></label>
                <input type="number" id="count" min="1" max="8" value="1">
            </div>

            <div class="form-row">
                <label id="label-group"></label>
                <select id="group"></select>
            </div>

            <div class="form-row">
                <label id="label-unified"></label>
                <select id="unified"></select>
            </div>

            <div class="form-row">
                <label id="label-round"></label>
                <input type="number" id="round" min="1" max="100" value="1">
            </div>

        </div>

        <div class="card command-box">
            <textarea id="command" readonly></textarea>

            <div id="error" class="error"></div>

            <button id="copyBtn"></button>
            <span id="copyMsg"></span>
        </div>

    </div>

    <script type="module" src="script/main.js"></script>
</body>

</html>
